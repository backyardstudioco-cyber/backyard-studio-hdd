<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BACKYARD STUDIO · 硬碟管理系統</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue','Arial',sans-serif;background:#F4F4F4;color:#111111;min-height:100vh}
    ::-webkit-scrollbar{width:4px;height:4px}
    ::-webkit-scrollbar-track{background:#F4F4F4}
    ::-webkit-scrollbar-thumb{background:#CCCCCC;border-radius:2px}
    ::-webkit-scrollbar-thumb:hover{background:#999}
    input,select,textarea{outline:none;font-family:inherit}
    input[type="date"]::-webkit-calendar-picker-indicator{opacity:0.4}
    @keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
    .fade-in{animation:fadeIn .2s ease}
    .card-hover{transition:box-shadow .15s,transform .15s}
    .card-hover:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.1)}
    .btn{cursor:pointer;transition:all .15s;border:none;font-family:inherit}
    .btn:active{transform:scale(.98)}
    .nav-item{transition:background .12s;cursor:pointer;border:none;background:none;width:100%;text-align:left;font-family:inherit}
    select option{background:#fff;color:#111}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useMemo } = React;

// ════════════════════════════════════════
// CONSTANTS
// ════════════════════════════════════════
const USERS = ['Franko','Jason','Harry','Sica','Ogison'];
const CAL_PROJECTS = ['REDBULL','REDBULL ft.子鵬','Red Bull ZERO','HOKA','NIKE','樂高Jeffrey','樂高李多慧','foodpanda','佳格X弘道','雪山啤酒','居家食物管理師','Gym Clash','Zero Bus','on running'];

function pad(n){return String(n).padStart(2,'0')}
function mk(type,capacity,displayName){
  return {id:displayName.replace(/\s+/g,'_').toUpperCase(),displayName,type,capacity,
    status:'available',currentProject:'',currentUser:'',rentalStartDate:null,
    notes:'',health:'良好',history:[],createdAt:new Date().toISOString()};
}

const INITIAL_DRIVES = [
  ...Array.from({length:8},(_,i)=>mk('SSD','2TB',`BY2T${pad(i+1)}`)),
  mk('SSD','1TB','BY1T01'),
  ...Array.from({length:5},(_,i)=>mk('SSD','4TB',`BY4T${pad(i+1)}`)),
  mk('HDD','2TB','WAKE UP'),
  mk('HDD','2TB','PANDA'),
  mk('HDD','2TB','DVG'),
];

// ════════════════════════════════════════
// UTILS
// ════════════════════════════════════════
const getDays = d => !d?0:Math.max(0,Math.floor((Date.now()-new Date(d))/86400000));
const fmt = d => {if(!d)return'—';const x=new Date(d);return`${x.getFullYear()}/${pad(x.getMonth()+1)}/${pad(x.getDate())}`};
const WEB_APP_URL='__WEB_APP_URL__';
const load = (k,def) => {try{const v=localStorage.getItem(k);return v?JSON.parse(v):def;}catch{return def;}};
const save = (k,v) => {try{localStorage.setItem(k,JSON.stringify(v));}catch{}};
const apiGet = () => fetch(`${WEB_APP_URL}?action=getDrives`,{redirect:'follow'}).then(r=>r.json());
const apiSave = (drives) => fetch(WEB_APP_URL,{method:'POST',mode:'no-cors',body:JSON.stringify({action:'saveDrives',drives})});

const STATUS = {
  available:{txt:'#166534',bg:'#F0FDF4',border:'#BBF7D0',label:'可使用'},
  in_use:{txt:'#92400E',bg:'#FFFBEB',border:'#FDE68A',label:'使用中'},
  maintenance:{txt:'#991B1B',bg:'#FEF2F2',border:'#FECACA',label:'維護中'},
};

// ════════════════════════════════════════
// SIDEBAR
// ════════════════════════════════════════
function Sidebar({page,setPage,drives}){
  const inUse=drives.filter(d=>d.status==='in_use').length;
  const over=drives.filter(d=>d.status==='in_use'&&getDays(d.rentalStartDate)>30).length;
  const nav=[
    {id:'dashboard',label:'儀表板'},
    {id:'drives',label:'硬碟管理'},
    {id:'rentals',label:'租借記錄'},
    {id:'calendar',label:'Google 日曆'},
    {id:'notifications',label:'通知提醒'},
    {id:'settings',label:'系統設定'},
  ];
  return (
    <div style={{width:200,flexShrink:0,background:'#fff',borderRight:'1px solid #E5E7EB',display:'flex',flexDirection:'column',minHeight:'100vh',position:'sticky',top:0}}>
      {/* LOGO */}
      <div style={{padding:'22px 18px 16px',borderBottom:'1px solid #E5E7EB',textAlign:'center'}}>
        <img
          src="logo.png"
          alt="BACKYARD STUDIO"
          style={{maxWidth:140,maxHeight:52,objectFit:'contain',display:'block',margin:'0 auto'}}
          onError={e=>{e.target.style.display='none';document.getElementById('txt-logo').style.display='block';}}
        />
        <div id="txt-logo" style={{display:'none',lineHeight:1.15}}>
          <div style={{fontSize:17,fontWeight:900,letterSpacing:3,color:'#111'}}>BACKYARD</div>
          <div style={{fontSize:9,letterSpacing:3,color:'#aaa',marginTop:2}}>STUDIO</div>
        </div>
        <div style={{fontSize:9,color:'#CCC',letterSpacing:1.5,marginTop:8,textTransform:'uppercase'}}>HDD Management</div>
        {over>0&&<div style={{marginTop:8,fontSize:11,color:'#DC2626',background:'#FEF2F2',padding:'3px 8px',borderRadius:4,border:'1px solid #FECACA'}}>⚠ {over} 顆超時</div>}
      </div>

      {/* NAV */}
      <nav style={{flex:1,padding:'8px 0'}}>
        {nav.map(n=>{
          const active=page===n.id;
          return (
            <button key={n.id} className="nav-item" onClick={()=>setPage(n.id)} style={{
              padding:'10px 18px',display:'flex',alignItems:'center',justifyContent:'space-between',fontSize:13,
              color:active?'#111':'#6B7280',
              borderLeft:`3px solid ${active?'#111':'transparent'}`,
              background:active?'#F3F4F6':'transparent',
              fontWeight:active?700:400,
            }}>
              <span>{n.label}</span>
              {n.id==='rentals'&&inUse>0&&<span style={{background:'#111',color:'#fff',fontSize:10,fontWeight:700,padding:'1px 6px',borderRadius:10}}>{inUse}</span>}
            </button>
          );
        })}
      </nav>

      {/* FOOTER */}
      <div style={{padding:'12px 18px',borderTop:'1px solid #E5E7EB'}}>
        <div style={{fontSize:11,color:'#9CA3AF'}}>{new Date().toLocaleDateString('zh-TW',{month:'short',day:'numeric',weekday:'short'})}</div>
        <div style={{fontSize:10,color:'#D1D5DB',marginTop:2}}>{drives.length} 顆硬碟 · v2.0</div>
      </div>
    </div>
  );
}

// ════════════════════════════════════════
// DRIVE CARD
// ════════════════════════════════════════
function DriveCard({drive,onClick}){
  const days=getDays(drive.rentalStartDate);
  const s=STATUS[drive.status]||STATUS.available;
  const over=days>30&&drive.status==='in_use';
  const topColor=over?'#EF4444':drive.status==='available'?'#111':drive.status==='in_use'?'#F59E0B':'#EF4444';
  return (
    <div className="card-hover" onClick={()=>onClick(drive)} style={{
      background:'#fff',border:`1px solid ${over?'#FCA5A5':s.border}`,
      borderRadius:10,padding:'14px 15px',cursor:'pointer',position:'relative',
      boxShadow:'0 1px 4px rgba(0,0,0,.06)',
    }}>
      <div style={{position:'absolute',top:0,left:0,right:0,height:3,borderRadius:'10px 10px 0 0',background:topColor}}/>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginTop:4,marginBottom:10}}>
        <div>
          <div style={{fontWeight:700,fontSize:14,color:'#111'}}>{drive.displayName}</div>
          <div style={{display:'flex',gap:4,marginTop:4}}>
            <span style={{fontSize:9,fontWeight:700,color:'#555',background:'#F3F4F6',padding:'1px 6px',borderRadius:3,letterSpacing:.5}}>{drive.type}</span>
            <span style={{fontSize:9,color:'#888',background:'#fff',padding:'1px 6px',borderRadius:3,border:'1px solid #E5E7EB'}}>{drive.capacity}</span>
          </div>
        </div>
        <div style={{fontSize:10,color:over?'#DC2626':s.txt,background:over?'#FEF2F2':s.bg,padding:'3px 8px',borderRadius:20,border:`1px solid ${over?'#FECACA':s.border}`,fontWeight:600,whiteSpace:'nowrap'}}>
          {over?'⚠ 超時':s.label}
        </div>
      </div>
      {drive.status==='in_use'&&(
        <div style={{borderTop:'1px solid #F3F4F6',paddingTop:8}}>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:6}}>
            <div><div style={{fontSize:9,color:'#9CA3AF',marginBottom:2}}>使用者</div><div style={{fontWeight:700,fontSize:12,color:'#111'}}>{drive.currentUser}</div></div>
            <div><div style={{fontSize:9,color:'#9CA3AF',marginBottom:2}}>天數</div><div style={{fontWeight:800,fontSize:15,color:over?'#DC2626':days>14?'#B45309':'#166534'}}>{days}天</div></div>
          </div>
          {drive.currentProject&&<div style={{marginTop:6}}><div style={{fontSize:9,color:'#9CA3AF',marginBottom:2}}>專案</div><div style={{fontSize:11,fontWeight:600,color:'#111',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{drive.currentProject}</div></div>}
        </div>
      )}
      {drive.status==='available'&&<div style={{textAlign:'center',fontSize:10,color:'#D1D5DB',marginTop:4}}>點擊租借</div>}
    </div>
  );
}

// ════════════════════════════════════════
// MODALS
// ════════════════════════════════════════
function Overlay({children}){
  return <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.4)',backdropFilter:'blur(3px)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:1000,padding:20}}>{children}</div>;
}
function ModalBox({title,children,onClose,width=480}){
  return (
    <div className="fade-in" style={{background:'#fff',borderRadius:12,padding:28,width:'100%',maxWidth:width,border:'1px solid #E5E7EB',maxHeight:'90vh',overflowY:'auto',boxShadow:'0 20px 60px rgba(0,0,0,.15)'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:22,paddingBottom:14,borderBottom:'1px solid #F3F4F6'}}>
        <div style={{fontSize:15,fontWeight:700,color:'#111'}}>{title}</div>
        {onClose&&<button className="btn" onClick={onClose} style={{background:'none',color:'#9CA3AF',fontSize:18,lineHeight:1,padding:4}}>✕</button>}
      </div>
      {children}
    </div>
  );
}
function Field({label,children}){
  return <div style={{marginBottom:15}}><label style={{fontSize:10,color:'#6B7280',display:'block',marginBottom:5,fontWeight:700,letterSpacing:.8,textTransform:'uppercase'}}>{label}</label>{children}</div>;
}
const IS={width:'100%',background:'#fff',color:'#111',border:'1px solid #E5E7EB',borderRadius:7,padding:'9px 12px',fontSize:13,transition:'border-color .12s'};
const foc=e=>{e.target.style.borderColor='#111';};
const blu=e=>{e.target.style.borderColor='#E5E7EB';};

function RentModal({drive,users,projects,onConfirm,onClose}){
  const [user,setUser]=useState('');
  const [proj,setProj]=useState('');
  const [custom,setCustom]=useState('');
  const [date,setDate]=useState(new Date().toISOString().slice(0,10));
  const [notes,setNotes]=useState('');
  const finalP=proj==='__custom'?custom:proj;
  return (
    <Overlay><ModalBox title={`租借 · ${drive.displayName}`} onClose={onClose}>
      <Field label="使用者 *">
        <select value={user} onChange={e=>setUser(e.target.value)} style={IS} onFocus={foc} onBlur={blu}>
          <option value="">— 請選擇 —</option>
          {users.map(u=><option key={u}>{u}</option>)}
        </select>
      </Field>
      <Field label="使用專案">
        <select value={proj} onChange={e=>setProj(e.target.value)} style={{...IS,marginBottom:proj==='__custom'?8:0}} onFocus={foc} onBlur={blu}>
          <option value="">— 選擇或自訂 —</option>
          {projects.map(p=><option key={p} value={p}>{p}</option>)}
          <option value="__custom">✏ 自訂專案名稱...</option>
        </select>
        {proj==='__custom'&&<input value={custom} onChange={e=>setCustom(e.target.value)} placeholder="輸入專案名稱..." style={IS} onFocus={foc} onBlur={blu}/>}
      </Field>
      <Field label="租借日期"><input type="date" value={date} onChange={e=>setDate(e.target.value)} style={IS} onFocus={foc} onBlur={blu}/></Field>
      <Field label="備註"><textarea value={notes} onChange={e=>setNotes(e.target.value)} rows={2} placeholder="其他說明..." style={{...IS,resize:'vertical'}} onFocus={foc} onBlur={blu}/></Field>
      <div style={{display:'flex',gap:10,marginTop:6}}>
        <button className="btn" onClick={onClose} style={{flex:1,padding:10,background:'#F3F4F6',color:'#6B7280',borderRadius:7,fontSize:13}}>取消</button>
        <button className="btn" onClick={()=>user&&onConfirm({user,project:finalP,startDate:date,notes})} style={{flex:1,padding:10,background:user?'#111':'#E5E7EB',color:user?'#fff':'#9CA3AF',borderRadius:7,fontSize:13,fontWeight:700,cursor:user?'pointer':'not-allowed'}}>確認租借</button>
      </div>
    </ModalBox></Overlay>
  );
}

function ReturnModal({drive,onConfirm,onClose}){
  const days=getDays(drive.rentalStartDate);
  return (
    <Overlay><ModalBox title={`歸還 · ${drive.displayName}`} onClose={onClose} width={420}>
      <div style={{background:'#F9FAFB',borderRadius:9,padding:16,marginBottom:20,display:'grid',gridTemplateColumns:'1fr 1fr',gap:14,border:'1px solid #E5E7EB'}}>
        {[['使用者',drive.currentUser,'#111'],['租借天數',`${days} 天`,days>30?'#DC2626':days>14?'#B45309':'#166534'],['開始日期',fmt(drive.rentalStartDate),'#111'],['專案',drive.currentProject||'未指定','#111']].map(([l,v,c])=>(
          <div key={l}><div style={{fontSize:10,color:'#9CA3AF',marginBottom:3}}>{l}</div><div style={{fontWeight:700,fontSize:l==='租借天數'?20:13,color:c}}>{v}</div></div>
        ))}
      </div>
      <p style={{color:'#6B7280',fontSize:13,marginBottom:20,lineHeight:1.6}}>確定歸還此硬碟？歸還後將記錄至歷史紀錄。</p>
      <div style={{display:'flex',gap:10}}>
        <button className="btn" onClick={onClose} style={{flex:1,padding:10,background:'#F3F4F6',color:'#6B7280',borderRadius:7,fontSize:13}}>取消</button>
        <button className="btn" onClick={onConfirm} style={{flex:1,padding:10,background:'#111',color:'#fff',borderRadius:7,fontWeight:700,fontSize:13}}>確認歸還</button>
      </div>
    </ModalBox></Overlay>
  );
}

function AddDriveModal({onConfirm,onClose}){
  const [type,setType]=useState('SSD');
  const [cap,setCap]=useState('2TB');
  const [name,setName]=useState('');
  const Seg=({opts,val,set})=>(
    <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
      {opts.map(o=><button key={o} className="btn" onClick={()=>set(o)} style={{flex:1,minWidth:48,padding:'8px 10px',background:val===o?'#111':'#fff',color:val===o?'#fff':'#6B7280',border:`1px solid ${val===o?'#111':'#E5E7EB'}`,borderRadius:6,fontSize:12,fontWeight:val===o?700:400}}>{o}</button>)}
    </div>
  );
  return (
    <Overlay><ModalBox title="新增硬碟" onClose={onClose} width={420}>
      <Field label="硬碟類型"><Seg opts={['SSD','HDD']} val={type} set={setType}/></Field>
      <Field label="容量"><Seg opts={['1TB','2TB','4TB','8TB','10TB']} val={cap} set={setCap}/></Field>
      <Field label="硬碟名稱 / 編號 *">
        <input value={name} onChange={e=>setName(e.target.value)} placeholder={type==='HDD'?'如：STUDIO, PROJECT...':'如：BY2T09...'} style={IS} onFocus={foc} onBlur={blu}/>
      </Field>
      <div style={{display:'flex',gap:10,marginTop:6}}>
        <button className="btn" onClick={onClose} style={{flex:1,padding:10,background:'#F3F4F6',color:'#6B7280',borderRadius:7}}>取消</button>
        <button className="btn" onClick={()=>name.trim()&&onConfirm({type,capacity:cap,displayName:name.trim(),id:name.trim().replace(/\s+/g,'_').toUpperCase()})} style={{flex:1,padding:10,background:name?'#111':'#E5E7EB',color:name?'#fff':'#9CA3AF',borderRadius:7,fontWeight:700,cursor:name?'pointer':'not-allowed'}}>新增硬碟</button>
      </div>
    </ModalBox></Overlay>
  );
}

function DetailModal({drive,users,projects,onRent,onReturn,onDelete,onMaint,onClose}){
  const days=getDays(drive.rentalStartDate);
  const s=STATUS[drive.status]||STATUS.available;
  return (
    <Overlay><ModalBox title={drive.displayName} onClose={onClose} width={520}>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:9,marginBottom:16}}>
        {[['類型',`${drive.type} · ${drive.capacity}`,'#111'],['狀態',s.label,s.txt],['健康度',drive.health||'良好','#166534'],
          ...(drive.status==='in_use'?[['使用者',drive.currentUser,'#111'],['天數',`${days} 天`,days>30?'#DC2626':days>14?'#B45309':'#166534'],['起始',fmt(drive.rentalStartDate),'#6B7280']]:[])
        ].map(([l,v,c])=>(
          <div key={l} style={{background:'#F9FAFB',borderRadius:8,padding:'11px 12px',border:'1px solid #F3F4F6'}}>
            <div style={{fontSize:9,color:'#9CA3AF',marginBottom:3,fontWeight:700,letterSpacing:.5,textTransform:'uppercase'}}>{l}</div>
            <div style={{fontWeight:700,fontSize:l==='天數'?17:12,color:c}}>{v}</div>
          </div>
        ))}
      </div>
      {drive.status==='in_use'&&drive.currentProject&&(
        <div style={{background:'#F9FAFB',border:'1px solid #E5E7EB',borderRadius:8,padding:'10px 14px',marginBottom:14}}>
          <div style={{fontSize:9,color:'#9CA3AF',marginBottom:3,fontWeight:700,letterSpacing:.5,textTransform:'uppercase'}}>專案</div>
          <div style={{fontWeight:700,fontSize:13,color:'#111'}}>{drive.currentProject}</div>
        </div>
      )}
      {drive.notes&&<div style={{background:'#FFFBEB',border:'1px solid #FDE68A',borderRadius:8,padding:'9px 14px',marginBottom:14,fontSize:12,color:'#92400E'}}>{drive.notes}</div>}
      <div style={{display:'flex',gap:8,flexWrap:'wrap',marginBottom:16,paddingBottom:16,borderBottom:'1px solid #F3F4F6'}}>
        {drive.status==='available'&&<button className="btn" onClick={onRent} style={{flex:1,minWidth:80,padding:9,background:'#111',color:'#fff',borderRadius:7,fontWeight:700,fontSize:12}}>租借</button>}
        {drive.status==='in_use'&&<button className="btn" onClick={onReturn} style={{flex:1,minWidth:80,padding:9,background:'#111',color:'#fff',borderRadius:7,fontWeight:700,fontSize:12}}>歸還</button>}
        {drive.status==='available'&&<button className="btn" onClick={()=>onMaint(true)} style={{flex:1,minWidth:80,padding:9,background:'#fff',color:'#B45309',border:'1px solid #FDE68A',borderRadius:7,fontSize:12}}>標記維護</button>}
        {drive.status==='maintenance'&&<button className="btn" onClick={()=>onMaint(false)} style={{flex:1,minWidth:80,padding:9,background:'#111',color:'#fff',borderRadius:7,fontWeight:700,fontSize:12}}>維護完成</button>}
        <button className="btn" onClick={onDelete} style={{padding:'9px 13px',background:'#fff',color:'#DC2626',border:'1px solid #FECACA',borderRadius:7,fontSize:12}}>刪除</button>
      </div>
      {drive.history&&drive.history.length>0&&(
        <>
          <div style={{fontSize:10,fontWeight:700,color:'#9CA3AF',letterSpacing:1,textTransform:'uppercase',marginBottom:9}}>租借歷史</div>
          <div style={{display:'flex',flexDirection:'column',gap:6,maxHeight:180,overflowY:'auto'}}>
            {[...drive.history].reverse().map((h,i)=>(
              <div key={i} style={{background:'#F9FAFB',borderRadius:7,padding:'9px 12px',fontSize:12,border:'1px solid #F3F4F6'}}>
                <div style={{display:'flex',justifyContent:'space-between',marginBottom:2}}><span style={{fontWeight:700,color:'#111'}}>{h.user}</span><span style={{color:'#6B7280',fontWeight:600}}>{h.days}天</span></div>
                <div style={{color:'#374151',marginBottom:2}}>{h.project||'未指定專案'}</div>
                <div style={{color:'#9CA3AF',fontSize:10}}>{fmt(h.startDate)} → {fmt(h.endDate)}</div>
              </div>
            ))}
          </div>
        </>
      )}
    </ModalBox></Overlay>
  );
}

// ════════════════════════════════════════
// PAGE HEADER
// ════════════════════════════════════════
function PH({title,sub}){
  return <div style={{marginBottom:22}}><h1 style={{fontSize:19,fontWeight:800,color:'#111'}}>{title}</h1>{sub&&<p style={{color:'#9CA3AF',fontSize:11,marginTop:3}}>{sub}</p>}</div>;
}

// ════════════════════════════════════════
// DASHBOARD
// ════════════════════════════════════════
function Dashboard({drives,setPage}){
  const today=new Date();
  const is20=today.getDate()===20;
  const avail=drives.filter(d=>d.status==='available').length;
  const inUse=drives.filter(d=>d.status==='in_use').length;
  const maint=drives.filter(d=>d.status==='maintenance').length;
  const over=drives.filter(d=>d.status==='in_use'&&getDays(d.rentalStartDate)>30);
  const active=drives.filter(d=>d.status==='in_use').sort((a,b)=>getDays(b.rentalStartDate)-getDays(a.rentalStartDate));
  const groups=[
    {label:'SSD 4TB',list:drives.filter(d=>d.type==='SSD'&&d.capacity==='4TB')},
    {label:'SSD 2TB',list:drives.filter(d=>d.type==='SSD'&&d.capacity==='2TB')},

function DrivesPage({drives,users,projects,onClick,onAdd}){
  const [type,setType]=useState('all');
  const [st,setSt]=useState('all');
  const [q,setQ]=useState('');
  const filtered=useMemo(()=>drives.filter(d=>{
    if(type!=='all'&&d.type!==type)return false;
    if(st!=='all'&&d.status!==st)return false;
    if(q){const ql=q.toLowerCase();return d.displayName.toLowerCase().includes(ql)||d.currentUser.toLowerCase().includes(ql)||d.currentProject.toLowerCase().includes(ql);}
    return true;
  }),[drives,type,st,q]);
  const Seg=({opts,val,set})=><div style={{display:'flex',gap:4}}>{opts.map(([v,l])=><button key={v} className="btn" onClick={()=>set(v)} style={{padding:'6px 11px',background:val===v?'#111':'#fff',color:val===v?'#fff':'#6B7280',border:'1px solid '+(val===v?'#111':'#E5E7EB'),borderRadius:6,fontSize:11,fontWeight:val===v?700:400}}>{l}</button>)}</div>;
  return (
    <div style={{padding:'26px 28px',maxWidth:1100}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:20,flexWrap:'wrap',gap:10}}>
        <PH title="硬碟管理" sub={`共 ${drives.length} 顆 · 顯示 ${filtered.length} 顆`}/>
        <button className="btn" onClick={onAdd} style={{padding:'9px 18px',background:'#111',color:'#fff',borderRadius:7,fontWeight:700,fontSize:12}}>＋ 新增硬碟</button>
      </div>
      <div style={{display:'flex',gap:8,marginBottom:16,flexWrap:'wrap'}}>
        <input value={q} onChange={e=>setQ(e.target.value)} placeholder="搜尋硬碟、使用者、專案..." style={{flex:'1 1 180px',background:'#fff',color:'#111',border:'1px solid #E5E7EB',borderRadius:7,padding:'7px 11px',fontSize:12}} onFocus={foc} onBlur={blu}/>
        <Seg opts={[['all','全部'],['SSD','SSD'],['HDD','HDD']]} val={type} set={setType}/>
        <Seg opts={[['all','全部'],['available','可使用'],['in_use','使用中'],['maintenance','維護中']]} val={st} set={setSt}/>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(188px,1fr))',gap:11}}>
        {filtered.map(d=><DriveCard key={d.id} drive={d} onClick={onClick}/>)}

      </div>
    </div>
  );
}

                  <td style={{padding:'10px 13px',fontWeight:700,color:'#111'}}>{d.displayName}</td>
                  <td style={{padding:'10px 13px',color:'#374151'}}>{d.currentUser}</td>
                  <td style={{padding:'10px 13px',color:'#111'}}>{d.currentProject||'—'}</td>
                  <td style={{padding:'10px 13px'}}><span style={{fontWeight:800,color:ov?'#DC2626':dy>14?'#B45309':'#166534'}}>{dy}</span><span style={{color:'#9CA3AF',fontSize:10}}> 天</span></td>
                  <td style={{padding:'10px 13px'}}><span style={{background:ov?'#FEF2F2':'#FFFBEB',color:ov?'#DC2626':'#B45309',padding:'2px 7px',borderRadius:10,fontSize:9,fontWeight:700,border:`1px solid ${ov?'#FECACA':'#FDE68A'}`}}>{ov?'超時':'正常'}</span></td>
                </tr>
              );})}
            </tbody>
          </table>
        ):<div style={{padding:40,textAlign:'center',color:'#D1D5DB',fontSize:12}}>目前沒有租借中的硬碟</div>}
      </div>
      <div style={{background:'#F9FAFB',border:'1px solid #E5E7EB',borderRadius:9,padding:16}}>
        <div style={{fontWeight:700,fontSize:11,marginBottom:7,color:'#111'}}>💡 自動 Email 通知</div>
        <div style={{fontSize:11,color:'#6B7280',lineHeight:1.8}}>透過 <strong>Google Apps Script</strong> 或 <strong>Zapier</strong> 設定每月20號自動寄送月報 Email 給團隊成員。</div>
      </div>
    </div>
  );
}

// ════════════════════════════════════════
// SETTINGS PAGE
// ════════════════════════════════════════
function SettingsPage({drives,users,setUsers}){
  const [nu,setNu]=useState('');
  const total=drives.reduce((a,d)=>a+parseInt(d.capacity),0);
  const exp=()=>{const blob=new Blob([JSON.stringify({drives,users,exportedAt:new Date().toISOString()},null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`backyard_backup_${new Date().toISOString().slice(0,10)}.json`;a.click();};
  const imp=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{try{const d=JSON.parse(ev.target.result);if(d.drives)save('by_drives',d.drives);if(d.users)save('by_users',d.users);alert('✅ 已還原，請重新整理');}catch{alert('❌ 格式錯誤');}};r.readAsText(f);};
  return (
    <div style={{padding:'26px 28px',maxWidth:840}}>
      <PH title="系統設定"/>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
        <div style={{background:'#fff',border:'1px solid #E5E7EB',borderRadius:9,padding:20,boxShadow:'0 1px 3px rgba(0,0,0,.04)'}}>
          <div style={{fontWeight:700,fontSize:12,marginBottom:13,color:'#111'}}>人員管理</div>
          <div style={{display:'flex',flexDirection:'column',gap:5,marginBottom:11}}>
            {users.map((u,i)=>(
              <div key={i} style={{display:'flex',justifyContent:'space-between',alignItems:'center',background:'#F9FAFB',borderRadius:7,padding:'8px 11px',border:'1px solid #F3F4F6'}}>
                <div style={{display:'flex',alignItems:'center',gap:8}}>
                  <div style={{width:27,height:27,borderRadius:'50%',background:`hsl(${u.charCodeAt(0)*40}deg 15% 18%)`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:10,fontWeight:700,color:'#fff'}}>{u[0]}</div>
                  <span style={{fontWeight:600,fontSize:12,color:'#111'}}>{u}</span>
                </div>
                <button className="btn" onClick={()=>setUsers(users.filter(x=>x!==u))} style={{background:'none',color:'#DC2626',fontSize:13,padding:3}}>✕</button>
              </div>
            ))}
          </div>
          <div style={{display:'flex',gap:7}}>
            <input value={nu} onChange={e=>setNu(e.target.value)} placeholder="新增人員..." onKeyDown={e=>{if(e.key==='Enter'&&nu.trim()){setUsers([...users,nu.trim()]);setNu('');}}} style={{...IS,flex:1}} onFocus={foc} onBlur={blu}/>
            <button className="btn" onClick={()=>{if(nu.trim()){setUsers([...users,nu.trim()]);setNu('');}}} style={{padding:'8px 13px',background:'#111',color:'#fff',borderRadius:7,fontWeight:700,fontSize:12}}>新增</button>
          </div>
        </div>
        <div style={{background:'#fff',border:'1px solid #E5E7EB',borderRadius:9,padding:20,boxShadow:'0 1px 3px rgba(0,0,0,.04)'}}>
          <div style={{fontWeight:700,fontSize:12,marginBottom:13,color:'#111'}}>系統資訊</div>
          {[['硬碟總數',`${drives.length} 顆`],['總容量',`${total} TB`],['SSD',`${drives.filter(d=>d.type==='SSD').length} 顆`],['HDD',`${drives.filter(d=>d.type==='HDD').length} 顆`],['使用中',`${drives.filter(d=>d.status==='in_use').length} 顆`],['可使用',`${drives.filter(d=>d.status==='available').length} 顆`],['人員數',`${users.length} 人`]].map(([l,v])=>(
            <div key={l} style={{display:'flex',justifyContent:'space-between',padding:'6px 0',borderBottom:'1px solid #F3F4F6'}}>
              <span style={{color:'#9CA3AF',fontSize:11}}>{l}</span><span style={{fontWeight:700,fontSize:11,color:'#111'}}>{v}</span>
            </div>
          ))}
        </div>
        <div style={{background:'#fff',border:'1px solid #E5E7EB',borderRadius:9,padding:20,gridColumn:'span 2',boxShadow:'0 1px 3px rgba(0,0,0,.04)'}}>
          <div style={{fontWeight:700,fontSize:12,marginBottom:13,color:'#111'}}>資料備份與還原</div>
          <div style={{display:'flex',gap:9,flexWrap:'wrap',marginBottom:9}}>
            <button className="btn" onClick={exp} style={{padding:'8px 17px',background:'#F3F4F6',color:'#111',border:'1px solid #E5E7EB',borderRadius:7,fontSize:11,fontWeight:700}}>備份資料 (JSON)</button>
            <label className="btn" style={{padding:'8px 17px',background:'#F3F4F6',color:'#6B7280',border:'1px solid #E5E7EB',borderRadius:7,fontSize:11,cursor:'pointer'}}>還原備份<input type="file" accept=".json" onChange={imp} style={{display:'none'}}/></label>
            <button className="btn" onClick={()=>{if(confirm('確定重置所有資料？此操作會清除 Google Sheets 資料，無法復原！')){fetch(WEB_APP_URL,{method:'POST',body:JSON.stringify({action:'saveDrives',drives:INITIAL_DRIVES})}).then(()=>{localStorage.clear();window.location.reload();}).catch(()=>{localStorage.clear();window.location.reload();});}}} style={{padding:'8px 17px',background:'#fff',color:'#DC2626',border:'1px solid #FECACA',borderRadius:7,fontSize:11}}>重置所有資料</button>
          </div>
          <div style={{fontSize:10,color:'#D1D5DB'}}>資料同步至 Google Sheets，全團隊共用同一份資料。</div>
        </div>
      </div>
    </div>
  );
}

// ════════════════════════════════════════
// APP
// ════════════════════════════════════════
function App(){
  const [drives,setDrives]=useState(()=>load('by_drives',INITIAL_DRIVES));
  const [users,setUsers]=useState(()=>load('by_users',USERS));
  const [page,setPage]=useState('dashboard');
  const [modal,setModal]=useState(null);
  const [sel,setSel]=useState(null);
  const [cloudSync,setCloudSync]=useState('loading'); // 'loading'|'ok'|'error'|'saving'
  const projects=useMemo(()=>[...new Set([...CAL_PROJECTS,...drives.filter(d=>d.currentProject).map(d=>d.currentProject)])].sort(),[drives]);

  // Load from Google Sheets on startup
  useEffect(()=>{
    setCloudSync('loading');
    apiGet().then(data=>{
      if(data&&data.drives&&data.drives.length>0){
        setDrives(data.drives);
        save('by_drives',data.drives);
      }
      setCloudSync('ok');
    }).catch(()=>setCloudSync('error'));
  },[]);

  // Save to Google Sheets when drives change (skip initial load)
  const isFirst=React.useRef(true);
  useEffect(()=>{
    save('by_drives',drives);
    if(isFirst.current){isFirst.current=false;return;}
    setCloudSync('saving');
    apiSave(drives).then(()=>setCloudSync('ok')).catch(()=>setCloudSync('error'));
  },[drives]);

  useEffect(()=>{save('by_users',users);},[users]);
  const click=d=>{setSel(d);setModal('detail');};
  const rentOK=({user,project,startDate,notes})=>{setDrives(p=>p.map(d=>d.id===sel.id?{...d,status:'in_use',currentUser:user,currentProject:project,rentalStartDate:startDate,notes}:d));setModal(null);setSel(null);};
  const retOK=()=>{const days=getDays(sel.rentalStartDate);const e={user:sel.currentUser,project:sel.currentProject,startDate:sel.rentalStartDate,endDate:new Date().toISOString(),days};setDrives(p=>p.map(d=>d.id===sel.id?{...d,status:'available',currentUser:'',currentProject:'',rentalStartDate:null,notes:'',history:[...(d.history||[]),e]}:d));setModal(null);setSel(null);};
  const addOK=({type,capacity,displayName,id})=>{setDrives(p=>[...p,{id,displayName,type,capacity,status:'available',currentProject:'',currentUser:'',rentalStartDate:null,notes:'',health:'良好',history:[],createdAt:new Date().toISOString()}]);setModal(null);};
  const del=()=>{if(confirm(`確定刪除 ${sel.displayName}？`)){setDrives(p=>p.filter(d=>d.id!==sel.id));setModal(null);setSel(null);}};
  const maint=(on)=>{setDrives(p=>p.map(d=>d.id===sel.id?{...d,status:on?'maintenance':'available'}:d));setModal(null);setSel(null);};
  const syncLabel={loading:'⏳ 載入中…',saving:'☁ 同步中…',ok:'✅ 已同步',error:'❌ 離線模式'}[cloudSync];
  const syncColor={loading:'#6B7280',saving:'#1D4ED8',ok:'#166534',error:'#DC2626'}[cloudSync];
  return (
    <div style={{display:'flex',minHeight:'100vh',background:'#F4F4F4'}}>
      <Sidebar page={page} setPage={setPage} drives={drives}/>
      <div style={{flex:1,overflowY:'auto',maxHeight:'100vh'}}>
        <div style={{display:'flex',justifyContent:'flex-end',padding:'6px 20px 0',fontSize:10,color:syncColor,fontWeight:600}}>{syncLabel}</div>
        {page==='dashboard'&&<Dashboard drives={drives} setPage={setPage}/>}
        {page==='drives'&&<DrivesPage drives={drives} users={users} projects={projects} onClick={click} onAdd={()=>setModal('add')}/>}
        {page==='rentals'&&<RentalsPage drives={drives}/>}
        {page==='calendar'&&<CalendarPage/>}
        {page==='notifications'&&<NotificationsPage drives={drives}/>}
        {page==='settings'&&<SettingsPage drives={drives} users={users} setUsers={u=>{setUsers(u);save('by_users',u);}}/>}
      </div>
      {modal==='detail'&&sel&&<DetailModal drive={sel} users={users} projects={projects} onRent={()=>setModal('rent')} onReturn={()=>setModal('return')} onDelete={del} onMaint={maint} onClose={()=>{setModal(null);setSel(null);}}/>}
      {modal==='rent'&&sel&&<RentModal drive={sel} users={users} projects={projects} onConfirm={rentOK} onClose={()=>setModal('detail')}/>}
      {modal==='return'&&sel&&<ReturnModal drive={sel} onConfirm={retOK} onClose={()=>setModal('detail')}/>}
      {modal==='add'&&<AddDriveModal onConfirm={addOK} onClose={()=>setModal(null)}/>}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
